version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: aegis-mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_security_password_99
      MYSQL_DATABASE: aegis_sec_db
      MYSQL_USER: aegis_operator
      MYSQL_PASSWORD: operator_password_55
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis-security-web
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=mysql://aegis_operator:operator_password_55@db:3306/aegis_sec_db
      - LOCAL_DATABASE_URL=file:./dev.db
      - BETTER_AUTH_SECRET=aegis_auth_secret_key_32_chars_long_value
      - BETTER_AUTH_URL=http://localhost:3000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY}
      - GOOGLE_SAFE_BROWSING_API_KEY=${GOOGLE_SAFE_BROWSING_API_KEY}

volumes:
  mysql-data:
